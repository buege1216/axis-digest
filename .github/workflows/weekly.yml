name: 軸心週報 Weekly Digest

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4.2.2

      - name: 還原資料庫
        run: |
          if [ -f db/articles.db ]; then
            cp db/articles.db articles.db
            echo "✅ 資料庫已還原"
          else
            echo "📭 第一次執行，資料庫從空白開始"
          fi

      - name: 安裝 Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行週報
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}

      - name: 儲存資料庫
        run: |
          mkdir -p db
          cp articles.db db/articles.db
          git config user.name "Axis Digest Bot"
          git config user.email "bot@axis-digest"
          git add db/articles.db
          git diff --staged --quiet || git commit -m "更新文章資料庫"
          git push
